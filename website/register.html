<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 民匠有约</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #1f2329;
      background: #f2f3f5;
    }

    :root {
      --primary: #1677FF;
      --primary-dark: #0958d9;
      --primary-50: #e6f4ff;
      --primary-100: #bae0ff;
      --text: #1f2329;
      --text-secondary: #4e5969;
      --text-muted: #86909c;
      --gray-200: #e5e6eb;
      --gray-300: #c9cdd4;
      --gray-400: #86909c;
      --radius: 8px;
      --radius-lg: 12px;
      --transition: all .2s ease;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-primary: 0 4px 12px rgba(22,119,255,0.25);
      --shadow-primary-lg: 0 6px 20px rgba(22,119,255,0.35);
    }

    .login-page {
      display: flex;
      min-height: 100vh;
      background: var(--bg, #f2f3f5);
    }

    /* ----- LEFT SIDE ----- */
    .login-side {
      flex: 1;
      background: linear-gradient(135deg, #1677FF 0%, #0958d9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 48px;
    }

    .login-side::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      top: -200px;
      right: -150px;
      pointer-events: none;
    }

    .login-side::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      bottom: -100px;
      left: -100px;
      pointer-events: none;
    }

    .login-side-content {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
    }

    .login-side-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 48px;
      letter-spacing: 1px;
    }

    .login-side-brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .login-side-title {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
      margin-bottom: 16px;
    }

    .login-side-title-grad {
      background: linear-gradient(135deg, #FFD700, #FFA940, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 900;
    }

    .login-side-desc {
      color: rgba(255,255,255,0.78);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .login-side-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .login-side-feature {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      transition: var(--transition);
    }

    .login-side-feature:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .login-side-feature-icon {
      margin-bottom: 10px;
      color: #fff;
    }

    .login-side-feature-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 3px;
    }

    .login-side-feature-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    /* ----- RIGHT SIDE ----- */
    .login-form-wrap {
      width: 520px;
      flex-shrink: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      padding: 40px 48px;
      position: relative;
      overflow-y: auto;
    }

    .login-back {
      position: absolute;
      top: 32px;
      right: 36px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .login-back:hover {
      color: var(--primary);
    }

    .login-form-header {
      margin-bottom: 28px;
    }

    .login-form-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-form-sub {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ----- FORM ----- */
    .login-form-group {
      margin-bottom: 16px;
      position: relative;
    }

    .login-form-group .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-form-input {
      width: 100%;
      height: 46px;
      padding: 0 14px 0 42px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      background: #fff;
      transition: var(--transition);
      outline: none;
      font-family: inherit;
    }

    .login-form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22,119,255,0.08);
    }

    .login-form-input::placeholder {
      color: var(--gray-400);
    }

    .login-form-input.error {
      border-color: #f53f3f;
      box-shadow: 0 0 0 3px rgba(245,63,63,0.08);
    }

    .login-form-input.error:focus {
      border-color: #f53f3f;
      box-shadow: 0 0 0 3px rgba(245,63,63,0.12);
    }

    .field-error {
      font-size: 12px;
      color: #f53f3f;
      margin-top: 4px;
      min-height: 18px;
      line-height: 1.4;
    }

    .login-captcha-row {
      display: flex;
      gap: 10px;
    }

    .login-captcha-row .login-form-input {
      flex: 1;
    }

    .login-captcha-btn {
      white-space: nowrap;
      padding: 0 16px;
      height: 46px;
      background: var(--primary-50);
      color: var(--primary);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--primary-100);
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .login-captcha-btn:hover {
      background: var(--primary-100);
    }

    .login-captcha-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .optional-label {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--gray-400);
      background: #f7f8fa;
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }

    /* ----- AGREEMENT ----- */
    .reg-agreement {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      cursor: pointer;
      line-height: 1.6;
      user-select: none;
    }

    .reg-agreement input {
      margin-top: 2px;
      accent-color: var(--primary);
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .reg-agreement a {
      color: var(--primary);
      text-decoration: none;
      transition: var(--transition);
    }

    .reg-agreement a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* ----- SUBMIT ----- */
    .login-submit {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #1677FF 0%, #0958d9 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: var(--radius);
      transition: var(--transition);
      letter-spacing: 2px;
      box-shadow: var(--shadow-primary);
      cursor: pointer;
      border: none;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-submit:hover {
      box-shadow: var(--shadow-primary-lg);
      transform: translateY(-1px);
    }

    .login-submit:active {
      transform: translateY(0);
    }

    .login-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ----- LOGIN LINK ----- */
    .reg-login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .reg-login-link a {
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }

    .reg-login-link a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* ----- TOAST ----- */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #fff;
      border: 1px solid var(--gray-200);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      border-radius: var(--radius-lg);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toast-icon.success {
      background: #e8ffea;
      color: #00b42a;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 960px) {
      .login-page {
        flex-direction: column;
      }
      .login-side {
        padding: 32px 24px;
        min-height: auto;
      }
      .login-side-title {
        font-size: 28px;
      }
      .login-side-features {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .login-form-wrap {
        width: 100%;
        padding: 32px 24px;
      }
    }

    @media (max-width: 480px) {
      .login-side-features {
        grid-template-columns: 1fr;
      }
      .login-form-wrap {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <!-- 左侧品牌区 -->
    <div class="login-side">
      <div class="login-side-content">
        <div class="login-side-brand">
          <div class="login-side-brand-icon">匠</div>
          民匠有约
        </div>
        <h1 class="login-side-title">

          <span class="login-side-title-grad">民匠有约</span>
        </h1>
        <p class="login-side-desc">注册即享全平台服务，连接发包方与优质匠人，让每一次合作都安心可靠</p>

            </div>
            <div class="login-side-feature-title">新人福利</div>
            <div class="login-side-feature-desc">首单立减 ¥50</div>
          </div>
          <div class="login-side-feature">
            <div class="login-side-feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
            </div>
            <div class="login-side-feature-title">信誉保障</div>
            <div class="login-side-feature-desc">实名认证 100%</div>
          </div>
          <div class="login-side-feature">
            <div class="login-side-feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            </div>
            <div class="login-side-feature-title">VIP 服务</div>
            <div class="login-side-feature-desc">一对一专属经理</div>
          </div>
          <div class="login-side-feature">
            <div class="login-side-feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg>
            </div>
            <div class="login-side-feature-title">快速入驻</div>
            <div class="login-side-feature-desc">3 分钟快速完成</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧表单区 -->
    <div class="login-form-wrap">
      <a href="index.html" class="login-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        返回首页
      </a>

      <div class="login-form-header">
        <div class="login-form-title">创建账号</div>
        <div class="login-form-sub">注册即享全平台服务</div>
      </div>

      <form id="registerForm" novalidate>
        <div class="login-form-group">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          </span>
          <input type="tel" class="login-form-input" id="phone" placeholder="请输入手机号" maxlength="11" autocomplete="off">
          <div class="field-error" id="phoneError"></div>

        <div class="login-form-group">
          <div class="login-captcha-row">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </span>
            <input type="text" class="login-form-input" id="smsCode" placeholder="请输入短信验证码" maxlength="6" autocomplete="off" style="padding-left: 42px;">
            <button type="button" class="login-captcha-btn" id="captchaBtn">获取验证码</button>
          </div>
          <div class="field-error" id="smsCodeError"></div>
        </div>

        <div class="login-form-group">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </span>
          <input type="password" class="login-form-input" id="password" placeholder="8-20位，包含字母和数字" maxlength="20" autocomplete="new-password">
          <div class="field-error" id="passwordError"></div>
        </div>

        <div class="login-form-group">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          </span>
          <input type="password" class="login-form-input" id="confirmPassword" placeholder="请再次输入密码" maxlength="20" autocomplete="new-password">
          <div class="field-error" id="confirmPasswordError"></div>
        </div>

        <div class="login-form-group">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>
          </span>
          <input type="text" class="login-form-input" id="companyName" placeholder="请输入公司名称" autocomplete="off" style="padding-right: 56px;">
          <span class="optional-label">选填</span>
          <div class="field-error" id="companyNameError"></div>
        </div>

        <div class="login-form-group">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </span>
          <input type="text" class="login-form-input" id="contactName" placeholder="请输入姓名 / 联系人" autocomplete="off">
          <div class="field-error" id="contactNameError"></div>
        </div>

        <label class="reg-agreement">
          <input type="checkbox" id="agreement">
          <span>我已阅读并同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a></span>
        </label>
        <div class="field-error" id="agreementError" style="margin-top: -12px; margin-bottom: 12px;"></div>

  <div class="toast" id="toast">

      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </span>
    <span id="toastText">注册成功</span>
  </div>

  <script>
    (function() {
      var phone = document.getElementById('phone');
      var smsCode = document.getElementById('smsCode');
      var password = document.getElementById('password');
      var confirmPassword = document.getElementById('confirmPassword');
      var companyName = document.getElementById('companyName');
      var contactName = document.getElementById('contactName');
      var agreement = document.getElementById('agreement');
      var captchaBtn = document.getElementById('captchaBtn');
      var submitBtn = document.getElementById('submitBtn');
      var toast = document.getElementById('toast');
      var toastText = document.getElementById('toastText');
      var form = document.getElementById('registerForm');

      function showError(el, msg) {
        var err = document.getElementById(el.id + 'Error');
        if (err) err.textContent = msg || '';
        el.classList.add('error');
      }

      function clearError(el) {
        var err = document.getElementById(el.id + 'Error');
        if (err) err.textContent = '';
        el.classList.remove('error');
      }

      function validatePhone() {
        var val = phone.value.trim();
        if (!val) { showError(phone, '请输入手机号'); return false; }
        if (!/^1[3-9]\d{9}$/.test(val)) { showError(phone, '请输入正确的11位手机号'); return false; }
        clearError(phone);
        return true;
      }

      function validateSmsCode() {
        var val = smsCode.value.trim();
        if (!val) { showError(smsCode, '请输入短信验证码'); return false; }
        if (!/^\d{6}$/.test(val)) { showError(smsCode, '验证码为6位数字'); return false; }
        clearError(smsCode);
        return true;
      }

      function validatePassword() {
        var val = password.value;
        if (!val) { showError(password, '请输入密码'); return false; }
        if (val.length < 8 || val.length > 20) { showError(password, '密码长度需在8-20位之间'); return false; }
        if (!/[a-zA-Z]/.test(val) || !/\d/.test(val)) { showError(password, '密码必须同时包含字母和数字'); return false; }
        clearError(password);
        return true;
      }

      function validateConfirmPassword() {
        var val = confirmPassword.value;
        if (!val) { showError(confirmPassword, '请再次输入密码'); return false; }
        if (val !== password.value) { showError(confirmPassword, '两次输入的密码不一致'); return false; }
        clearError(confirmPassword);
        return true;
      }

      function validateContactName() {
        var val = contactName.value.trim();
        if (!val) { showError(contactName, '请输入姓名/联系人'); return false; }
        clearError(contactName);
        return true;
      }

      function validateAgreement() {
        var err = document.getElementById('agreementError');
        if (!agreement.checked) {
          if (err) err.textContent = '请阅读并同意用户协议和隐私政策';
          return false;
        }
        if (err) err.textContent = '';
        return true;
      }

      phone.addEventListener('input', function() { phone.value = phone.value.replace(/\D/g, ''); clearError(phone); });
      smsCode.addEventListener('input', function() { smsCode.value = smsCode.value.replace(/\D/g, ''); clearError(smsCode); });
      password.addEventListener('input', function() { clearError(password); });
      confirmPassword.addEventListener('input', function() { clearError(confirmPassword); });
      contactName.addEventListener('input', function() { clearError(contactName); });
      companyName.addEventListener('input', function() { clearError(companyName); });
      agreement.addEventListener('change', function() {
        var err = document.getElementById('agreementError');
        if (err) err.textContent = '';
      });

      // 验证码倒计时
      captchaBtn.addEventListener('click', function() {
        if (captchaBtn.disabled) return;
        var phoneVal = phone.value.trim();
        if (!phoneVal) { showError(phone, '请先输入手机号'); phone.focus(); return; }
        if (!/^1[3-9]\d{9}$/.test(phoneVal)) { showError(phone, '请输入正确的11位手机号'); phone.focus(); return; }
        clearError(phone);

        var sec = 60;
        captchaBtn.disabled = true;
        captchaBtn.textContent = sec + 's 后重发';
        var timer = setInterval(function() {
          sec--;
          if (sec <= 0) {
            clearInterval(timer);
            captchaBtn.disabled = false;
            captchaBtn.textContent = '获取验证码';
          } else {
            captchaBtn.textContent = sec + 's 后重发';
          }
        }, 1000);
      });

      function showToast(msg) {
        toastText.textContent = msg;
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2500);
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var ok = validatePhone() & validateSmsCode() & validatePassword() & validateConfirmPassword() & validateContactName() & validateAgreement();
        if (!ok) return;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>注册中...';

        setTimeout(function() {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '立即注册';
          showToast('注册成功，请完成认证');
          localStorage.setItem('mjyy_logged_in', 'true');
          // 保存用户基础信息
          var userData = {
            name: contactName.value.trim() || '新用户',
            position: '',
            mobile: phone.value.trim(),
            company: companyName.value.trim() || ''
          };
          localStorage.setItem('mjyy_user_data', JSON.stringify(userData));
          // 重置认证状态
          localStorage.removeItem('mjyy_verify_step');
          localStorage.removeItem('mjyy_personal_data');
          localStorage.removeItem('mjyy_enterprise_data');
          localStorage.removeItem('mjyy_contract_signed');
          setTimeout(function() {
            window.location.href = 'verify.html';
          }, 1200);
        }, 1500);
      });
    })();
  </script>
</body>
</html>
